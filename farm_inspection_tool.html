        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, dbVersion);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('drafts')) {
                        db.createObjectStore('drafts');
                    }
                    if (!db.objectStoreNames.contains('history')) {
                        db.createObjectStore('history');
                    }
                };
                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (event) => reject(event.target.error);
            });
        };

        const saveToDB = async (storeName, key, value) => {
            try {
                const dbInstance = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = dbInstance.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(value, key);
                    request.onsuccess = () => resolve();
                    request.onerror = (event) => reject(event.target.error);
                });
            } catch (err) {
                console.error("IndexedDB Save Error:", err);
            }
        };

        // --- Image Compression Utility ---
        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1024;
                        const MAX_HEIGHT = 1024;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = () => {
                        resolve(event.target.result);
                    }
                };
                reader.onerror = () => resolve(null);
            });
        };

        const calculateScore = (rows) => {
            if (!Array.isArray(rows)) return 0;
            let totalScore = 0;
            let count = 0;
            rows.forEach(row => {
                if (row.status) {
                    const option = STATUS_OPTIONS.find(opt => opt.value === row.status);
                    if (option && option.score !== null) {
                        totalScore += option.score;
                        count++;
                    }
                }
                for (let i = 1; i <= 6; i++) {
                    const key = `status_${i}`;
                    if (row[key]) {
                        const option = STATUS_OPTIONS.find(opt => opt.value === row[key]);
                        if (option && option.score !== null) {
                            totalScore += option.score;
                            count++;
                        }
                    }
                }
            });
            if (count === 0) return 0;
            return Math.round(totalScore / count);
        };

        const getScoreColor = (score) => {
            if (score >= 90) return 'text-green-600';
            if (score >= 80) return 'text-blue-600';
            if (score >= 60) return 'text-cyan-600';
            if (score >= 40) return 'text-yellow-600';
            return 'text-red-600';
        };

            // 3. Fetch history and subscribe to realtime changes
            useEffect(() => {

                console.log("Fetching inspection_tool_records...");
                
                const fetchHistory = async () => {
                    const { data, error } = await supabase
                        .from('inspection_tool_records')
                        .select('*')
                        .order('date', { ascending: false });
                    if (error) {
                        console.error("Supabase fetch error:", error);
                        setHistory([]);
                    } else {
                        console.log("Data received:", data.length, "records");
                        setHistory(data);
                    }
                };
                fetchHistory();
                
                const channel = supabase
                    .channel('records_changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'inspection_tool_records' }, (payload) => {
                        const evt = payload.eventType;
                        if (evt === 'INSERT') {
                            setHistory(prev => [payload.new, ...prev].sort((a, b) => new Date(b.date) - new Date(a.date)));
                        } else if (evt === 'DELETE') {
                            setHistory(prev => prev.filter(r => r.id !== payload.old.id));
                        } else if (evt === 'UPDATE') {
                            setHistory(prev => prev.map(r => r.id === payload.new.id ? { ...r, ...payload.new } : r).sort((a, b) => new Date(b.date) - new Date(a.date)));
                        }
                    })
                    .subscribe();
                
                return () => { supabase.removeChannel(channel); };
            }, [user]);

            // Debounced save to IndexedDB to prevent excessive writes
            useEffect(() => {

                                            ) : (
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-right text-sm">
                                                        <thead className="bg-gray-50 text-gray-600 border-b">
                                                            <tr><th className="p-4 font-semibold">التاريخ</th><th className="p-4 font-semibold">الموقع</th><th className="p-4 font-semibold">المفتش</th><th className="p-4 font-semibold text-center">النتيجة</th><th className="p-4 font-semibold text-center">الإجراءات</th></tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-100">
                                                            {history.filter(item => historyFilter === 'all' || item.facility_id === historyFilter).map((record) => (
                                                                <tr key={record.id} className="hover:bg-gray-50 group">
                                                                    <td className="p-4 text-gray-800 font-medium">{record.date}</td>
                                                                    <td className="p-4 text-blue-600 font-medium">{record.facility_title}</td>
                                                                    <td className="p-4 text-gray-600">{record.inspector}</td>
                                                                    <td className="p-4 text-center">
                                                                        <span className={`inline-block px-2 py-1 rounded-full text-xs font-bold ${record.score >= 80 ? 'bg-green-100 text-green-800' : record.score >= 60 ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'}`}>{record.score}%</span>
                                                                    </td>
                                                                    <td className="p-4 flex justify-center gap-2">
                                                                        <button onClick={() => loadRecord(record)} className="flex items-center gap-1 px-3 py-1.5 bg-blue-50 text-blue-600 rounded-md hover:bg-blue-100 transition-colors text-xs font-bold" title="عرض"><Icons.Eye size={14} />عرض</button>
                                                                        <button onClick={() => deleteRecord(record.id)} className="flex items-center gap-1 px-3 py-1.5 bg-red-50 text-red-600 rounded-md hover:bg-red-100 transition-colors text-xs opacity-0 group-hover:opacity-100" title="حذف"><Icons.Trash2 size={14} /></button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {viewMode === 'analytics' && (
                                    <div className="max-w-7xl mx-auto space-y-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-xl font-bold text-gray-800">لوحة المؤشرات والتحليل البياني</h3>
                                            <div className="text-sm text-gray-500 bg-white px-3 py-1 rounded shadow-sm border">عدد السجلات: {history.length}</div>
                                        </div>
                                        {history.length < 2 ? (
                                            <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center text-yellow-800">
                                                <Icons.Activity size={32} className="mx-auto mb-2 opacity-50"/>
                                                <p className="font-bold">لا توجد بيانات كافية للتحليل</p>
                                                <p className="text-sm mt-1">يرجى حفظ سجلين أو أكثر لتفعيل الرسوم البيانية.</p>
                                            </div>
                                        ) : (
                                            <div className="analytics-print-container">
                                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 analytics-print-item">
                                                    <h4 className="font-bold text-gray-700 mb-6 flex items-center gap-2"><Icons.TrendingUp size={18} className="text-blue-500" />تطور مستوى الأداء</h4>
                                                    <div className="h-64 w-full" style={{ direction: 'ltr' }}>
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <LineChart data={analyticsData.trendData}>
                                                                <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                                                                <XAxis dataKey="date" fontSize={12} tick={{fill: '#666'}} />
                                                                <YAxis domain={[0, 100]} fontSize={12} tick={{fill: '#666'}} />
                                                                <Tooltip contentStyle={{borderRadius: '8px', border: 'none'}} />
                                                                <Legend />
                                                                <Line type="monotone" dataKey="score" name="النتيجة" stroke="#3b82f6" strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} />
                                                            </LineChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 analytics-print-item">
                                                    <h4 className="font-bold text-gray-700 mb-6 flex items-center gap-2"><Icons.BarChart2 size={18} className="text-purple-500" />مقارنة الأداء بين الأقسام</h4>
                                                    <div className="h-64 w-full" style={{ direction: 'ltr' }}>
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <BarChart data={analyticsData.comparisonData}>
                                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#eee" />
                                                                <XAxis dataKey="name" fontSize={10} tick={{fill: '#666'}} interval={0} angle={-15} textAnchor="end" height={60} />
                                                                <YAxis domain={[0, 100]} fontSize={12} tick={{fill: '#666'}} />
                                                                <Tooltip cursor={{fill: 'transparent'}} contentStyle={{borderRadius: '8px'}} />
                                                                <Bar dataKey="average" name="متوسط التقييم" fill="#8b5cf6" radius={[4, 4, 0, 0]} barSize={40} />
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 analytics-print-full lg:col-span-2">
                                                    <h4 className="font-bold text-gray-700 mb-6 flex items-center gap-2"><Icons.PieChart size={18} className="text-green-500" />توزيع حالات التقييم</h4>
                                                    <div className="h-64 w-full flex justify-center" style={{ direction: 'ltr' }}>
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <PieChart>
                                                                <Pie data={analyticsData.pieData} cx="50%" cy="50%" labelLine={false} label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`} outerRadius={80} fill="#8884d8" dataKey="value">
                                                                    {analyticsData.pieData.map((entry, index) => (<Cell key={`cell-${index}`} fill={entry.color} />))}
                                                                </Pie>
                                                                <Tooltip />
                                                                <Legend verticalAlign="bottom" height={36}/>
                                                            </PieChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render application safely
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
